<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muriel&rsquo;s Storybook</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Sky */
  .sky {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(180deg,
      #b8dff5 0%,
      #d6eefc 40%,
      #e8f5fd 58%,
      #cce8f7 62%
    );
  }

  /* Clouds */
  .cloud {
    position: absolute;
    border-radius: 50px;
    background: rgba(255,255,255,0.82);
    filter: blur(2px);
    animation: driftCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.82);
    border-radius: 50%;
  }
  .c1 { width: 120px; height: 30px; top: 10%; left: 5%; animation-duration: 55s; animation-delay: -10s; }
  .c1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
  .c1::after  { width: 35px; height: 35px; top: -15px; left: 50px; }

  .c2 { width: 80px; height: 20px; top: 20%; left: 30%; animation-duration: 70s; animation-delay: -30s; opacity: 0.7; }
  .c2::before { width: 35px; height: 35px; top: -18px; left: 10px; }
  .c2::after  { width: 25px; height: 25px; top: -10px; left: 35px; }

  .c3 { width: 160px; height: 35px; top: 8%; left: 65%; animation-duration: 80s; animation-delay: -50s; }
  .c3::before { width: 65px; height: 65px; top: -32px; left: 20px; }
  .c3::after  { width: 50px; height: 50px; top: -22px; left: 70px; }

  .c4 { width: 90px; height: 22px; top: 28%; left: 80%; animation-duration: 62s; animation-delay: -20s; opacity: 0.6; }
  .c4::before { width: 38px; height: 38px; top: -20px; left: 12px; }
  .c4::after  { width: 28px; height: 28px; top: -12px; left: 42px; }

  @keyframes driftCloud {
    from { transform: translateX(0); }
    to   { transform: translateX(-120vw); }
  }

  /* SVG wave + sea layer */
  .sea-container {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; 
    /* height covers from wave-top to bottom */
  }

  .sea-svg {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    display: block;
    overflow: visible;
  }

  /* Animated wave path */
  .wave-path {
    animation: waveShift 6s ease-in-out infinite;
  }
  @keyframes waveShift {
    0%   { d: path("M0,40 C15vw,0 35vw,80 50vw,40 C65vw,0 85vw,80 100vw,40 L100vw,100vh L0,100vh Z"); }
    50%  { d: path("M0,60 C15vw,20 35vw,100 50vw,60 C65vw,20 85vw,100 100vw,60 L100vw,100vh L0,100vh Z"); }
    100% { d: path("M0,40 C15vw,0 35vw,80 50vw,40 C65vw,0 85vw,80 100vw,40 L100vw,100vh L0,100vh Z"); }
  }

  /* Sea shimmer lines */
  .shimmer {
    position: absolute;
    height: 2px;
    border-radius: 2px;
    background: rgba(255,255,255,0.25);
    animation: shimmerAnim ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes shimmerAnim {
    from { opacity: 0.15; transform: scaleX(0.8); }
    to   { opacity: 0.5;  transform: scaleX(1.1); }
  }

  /* ===== YACHT ===== */
  .yacht-wrap {
    position: absolute;
    left: -220px;
    transform-origin: center bottom;
    z-index: 5;
  }

  /* triggered by JS after overlay click */
  .yacht-wrap.sailing {
    animation: sailIn 4.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  @keyframes sailIn {
    0%   { left: -220px; }
    100% { left: calc(50vw - 70px); }
  }

  .yacht-wrap.arrived {
    left: calc(50vw - 70px);
    animation: bob 3s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%       { transform: translateY(-5px) rotate(1deg); }
    75%       { transform: translateY(3px) rotate(-0.8deg); }
  }

  .yacht-svg {
    width: clamp(160px, 24vw, 300px);
    height: auto;
    filter: drop-shadow(4px 10px 14px rgba(0,40,90,0.4));
    display: block;
  }

  /* Wake lines behind yacht */
  .wake {
    position: absolute;
    bottom: -2px;
    right: 100%;
    width: 0;
    height: 6px;
    border-top: 3px solid rgba(255,255,255,0.5);
    border-radius: 0 3px 3px 0;
    animation: wakeGrow 4.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    animation-delay: 0.6s;
  }
  .wake2 {
    bottom: 10px;
    height: 4px;
    border-top-width: 2px;
    border-color: rgba(255,255,255,0.3);
  }
  .yacht-wrap.sailing .wake,
  .yacht-wrap.arrived .wake {
    animation: wakeGrow 4.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  @keyframes wakeGrow {
    0%   { width: 0vw; }
    100% { width: calc(50vw - 70px + 220px); }
  }

  /* ===== TITLE ===== */
  .title {
    position: absolute;
    top: clamp(16px, 5vh, 48px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 5s;
    white-space: nowrap;
  }
  .title h1 {
    font-size: clamp(1.4rem, 4vw, 3rem);
    color: #1a4f7a;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 400;
    text-shadow: 0 2px 12px rgba(255,255,255,0.8);
  }
  .title p {
    font-size: clamp(0.7rem, 1.5vw, 1rem);
    color: #4a82a6;
    letter-spacing: 0.3em;
    margin-top: 4px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ===== CLICK TO START OVERLAY ===== */
  #startOverlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: rgba(10, 40, 70, 0.45);
    backdrop-filter: blur(3px);
    animation: overlayPulse 3s ease-in-out infinite;
  }
  @keyframes overlayPulse {
    0%,100% { background: rgba(10,40,70,0.40); }
    50%      { background: rgba(10,40,70,0.55); }
  }
  #startOverlay .anchor-icon {
    font-size: clamp(3rem, 8vw, 6rem);
    margin-bottom: 0.4em;
    animation: anchorBob 2.4s ease-in-out infinite;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }
  @keyframes anchorBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }
  #startOverlay p {
    color: #e8f5fd;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    font-family: Georgia, serif;
  }
  #startOverlay.hiding {
    transition: opacity 0.8s ease;
    opacity: 0;
    pointer-events: none;
  }

  /* ===== THUMBNAIL SCROLL TRACK ===== */
  #thumbTrack {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 55%;          /* sits in the lower sea area */
    overflow: hidden;
    pointer-events: none; /* enabled after yacht settles */
    z-index: 10;
  }
  #thumbScroller {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 6vw 2% 6vw;
    gap: clamp(24px, 4vw, 60px);
    cursor: grab;
    user-select: none;
    box-sizing: border-box;
  }
  #thumbScroller:active { cursor: grabbing; }

  .thumb-item {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    opacity: 0;
    transform: translateY(60px);
    transition: transform 0.18s ease, filter 0.18s ease;
    pointer-events: auto;
  }
  .thumb-item.visible {
    animation: thumbRise 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes thumbRise {
    from { opacity: 0; transform: translateY(60px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .thumb-item:hover .thumb-img-wrap {
    transform: translateY(-8px) scale(1.04);
    filter: drop-shadow(0 12px 20px rgba(0,0,80,0.5));
  }
  .thumb-item .thumb-img-wrap {
    transition: transform 0.25s ease, filter 0.25s ease;
    filter: drop-shadow(0 6px 12px rgba(0,0,80,0.4));
  }
  .thumb-item img {
    display: block;
/*    width: clamp(110px, 14vw, 200px); */
    width: clamp(140px, 18vw, 260px);
    height: auto;
    border-radius: 4px;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .thumb-item .thumb-title {
    margin-top: 6px;
    color: rgba(255,255,255,0.85);
/*    font-size: clamp(0.55rem, 1vw, 0.8rem); */
    font-size: clamp(0.75rem, 1.3vw, 1.1rem);
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    max-width: clamp(115px, 14.5vw, 210px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
  }

  /* bob animation per-item, offset by index */
  .thumb-item.visible {
    animation: thumbRise 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .thumb-item .thumb-bob {
    animation: thumbBob 3s ease-in-out infinite;
  }
  @keyframes thumbBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }

  /* scroll edge hints */
  .scroll-hint {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    color: white;
    cursor: pointer;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
    backdrop-filter: blur(4px);
  }
  .scroll-hint.show { opacity: 1; }
  #hintLeft  { left:  10px; }
  #hintRight { right: 10px; }

  /* ===== MOBILE STORIES BUTTON ===== */
  #storiesBtn {
    display: none;
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 50;
    background: rgba(20,70,120,0.85);
    color: white;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 30px;
    padding: 10px 18px;
    font-size: 1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: background 0.2s;
  }
  #storiesBtn:active { background: rgba(20,70,120,1); }

  /* ===== MOBILE STORIES PANEL ===== */
  #storiesPanel {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: linear-gradient(180deg, rgba(10,45,90,0.97) 0%, rgba(6,29,56,0.99) 100%);
    border-radius: 18px 18px 0 0;
    padding: 18px 16px 32px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
    max-height: 70vh;
    overflow-y: auto;
  }
  #storiesPanel.open { transform: translateY(0); }
  #storiesPanel h2 {
    color: #cde8f8;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 16px;
    font-weight: 400;
  }
  #storiesPanel .panel-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none; border: none;
    color: rgba(255,255,255,0.6);
    font-size: 1.4rem;
    cursor: pointer;
  }
  #mobileThumbGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  #mobileThumbGrid .m-thumb {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  #mobileThumbGrid .m-thumb img {
    width: 100%;
    border-radius: 4px;
    border: 1.5px solid rgba(255,255,255,0.4);
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }
  #mobileThumbGrid .m-thumb span {
    margin-top: 5px;
    color: rgba(255,255,255,0.8);
    font-size: 0.65rem;
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* ===== PDF OVERLAY ===== */
  #pdfOverlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: #1a2a3a;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #pdfOverlay.open {
    opacity: 1;
    pointer-events: all;
  }
  #pdfTopBar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: rgba(6,29,56,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  #pdfBackBtn {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.35);
    color: #cde8f8;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
  }
  #pdfBackBtn:hover { background: rgba(255,255,255,0.1); }
  #pdfTitle {
    color: #cde8f8;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    font-family: Georgia, serif;
  }
  #pdfFrame {
    flex: 1;
    border: none;
    width: 100%;
    background: #fff;
  }

  /* ===== RESPONSIVE BREAKPOINT ===== */
  @media (max-width: 640px) {
    #thumbTrack { display: none; }
    #storiesBtn { display: block; }
    #storiesPanel { display: block; }
  }

</style>
</head>
<body>
<div class="scene">

  <!-- CLICK TO START OVERLAY -->
  <div id="startOverlay">
    <div class="anchor-icon">⚓</div>
    <p style='margin-bottom: 20px'>Turn sound on</p>
    <p>Click to set sail</p>
  </div>


  <!-- SKY -->
  <div class="sky"></div>

  <!-- CLOUDS -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>

  <!-- TITLE -->
  <div class="title">
    <h1>Muriel&rsquo;s Storybook</h1>
    <p>Set sail &amp; explore</p>
  </div>

  <!-- SEA SVG (wave + deep water) -->
  <svg class="sea-svg" id="seaSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"
       style="position:absolute;bottom:0;left:0;width:100%;overflow:visible;">
    <defs>
      <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#1a6fa8"/>
        <stop offset="40%"  stop-color="#0d4f82"/>
        <stop offset="100%" stop-color="#062d56"/>
      </linearGradient>
      <linearGradient id="waveTop" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#5bbfea" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#1a6fa8" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- YACHT wrapper (positioned by JS) -->
  <div class="yacht-wrap" id="yacht">
    <!-- Wake trails -->
    <div class="wake"></div>
    <div class="wake wake2"></div>

    <!-- Yacht canvas — PNG with background removed via JS -->
    <canvas id="yachtCanvas" class="yacht-svg"></canvas>
  </div>

  <!-- Shimmer lines (added via JS) -->


  <!-- THUMBNAIL SCROLL TRACK (desktop) -->
  <div id="thumbTrack">
    <div id="hintLeft"  class="scroll-hint">&#8249;</div>
    <div id="hintRight" class="scroll-hint">&#8250;</div>
    <div id="thumbScroller"></div>
  </div>

  <!-- MOBILE STORIES BUTTON + PANEL -->
  <button id="storiesBtn">📚 Stories</button>
  <div id="storiesPanel">
    <button class="panel-close" id="panelClose">&#10005;</button>
    <h2>Stories</h2>
    <div id="mobileThumbGrid"></div>
  </div>

  <!-- PDF OVERLAY -->
  <div id="pdfOverlay">
    <div id="pdfTopBar">
      <button id="pdfBackBtn">⛵ Back to sea</button>
      <span id="pdfTitle"></span>
    </div>
    <iframe id="pdfFrame" title="Story"></iframe>
  </div>

</div>

<script>
  const scene = document.querySelector('.scene');
  const seaSvg = document.getElementById('seaSvg');
  const yacht  = document.getElementById('yacht');

  function getWaveY(x, t) {
    // matches the CSS wave shape: two full sine cycles across screen width
    const W = window.innerWidth;
    const amp = 30; // px amplitude
    const base = window.innerHeight * 0.35; // wave sits at ~35% down
    return base + amp * Math.sin((x / W) * Math.PI * 2 + t);
  }

  function buildSea() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    seaSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    seaSvg.setAttribute('height', H);

    // Remove old paths
    while (seaSvg.children.length > 1) seaSvg.removeChild(seaSvg.lastChild);

    // Wave + fill
    const wavePoly = document.createElementNS('http://www.w3.org/2000/svg','path');
    wavePoly.setAttribute('fill','url(#seaGrad)');
    wavePoly.classList.add('wavePath');
    seaSvg.appendChild(wavePoly);

    // Top gleam strip on wave
    const gleam = document.createElementNS('http://www.w3.org/2000/svg','path');
    gleam.setAttribute('fill','url(#waveTop)');
    gleam.setAttribute('opacity','0.5');
    gleam.classList.add('gleamPath');
    seaSvg.appendChild(gleam);

    updateWave(0);
  }

  let phase = 0;
  function updateWave(dt) {
    phase += dt * 0.0008;
    const W = window.innerWidth;
    const H = window.innerHeight;
    const steps = 80;
    let wavePoints = '';
    let gleamPoints = '';
    for (let i = 0; i <= steps; i++) {
      const x = (i / steps) * W;
      const amp = 28;
      const base = H * 0.35;
      const y = base + amp * Math.sin((i / steps) * Math.PI * 2 + phase);
      wavePoints += `${i === 0 ? 'M' : 'L'}${x},${y} `;
      gleamPoints += `${i === 0 ? 'M' : 'L'}${x},${y} `;
    }
    const waveFill = wavePoints + `L${W},${H} L0,${H} Z`;
    const gleamFill = gleamPoints + `L${W},${H*0.35+28} L${W},${H*0.29} Z`;

    const wp = seaSvg.querySelector('.wavePath');
    const gp = seaSvg.querySelector('.gleamPath');
    if (wp) wp.setAttribute('d', waveFill);
    if (gp) gp.setAttribute('d', gleamFill);

    // Position yacht on the wave at ~50% x
    const yachtX = W * 0.5 - 70; // centre (matches CSS animation endpoint)
    const yachtWaveY = H * 0.35 + 28 * Math.sin(Math.PI + phase) - 30; // -30 = hull offset
    yacht.style.top = yachtWaveY + 'px';
  }

  // Add shimmer lines inside the sea
  function addShimmers() {
    const old = document.querySelectorAll('.shimmer');
    old.forEach(e => e.remove());
    const H = window.innerHeight;
    const W = window.innerWidth;
    const seaTop = H * 0.31;
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.className = 'shimmer';
      const topPct = seaTop + Math.random() * (H - seaTop - 30);
      s.style.top = topPct + 'px';
      s.style.left = (Math.random() * 0.7 * W) + 'px';
      s.style.width = (40 + Math.random() * 120) + 'px';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      s.style.animationDelay = (Math.random() * 3) + 's';
      scene.appendChild(s);
    }
  }

  buildSea();
  addShimmers();

  let last = null;
  function loop(ts) {
    const dt = last ? ts - last : 16;
    last = ts;
    updateWave(dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

    const canvas = document.getElementById('yachtCanvas');
    const img = new Image();
    img.onload = function() {
      // size canvas to image
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      // Remove sky-blue / near-white background
      // Sample corner pixel as reference background colour
      const imgData = ctx.getImageData(0, 0, img.width, img.height);
      const data = imgData.data;
      // corner sample (top-left, x=4,y=4)
      const ri = (4 * img.width + 4) * 4;
      const br = data[ri], bg = data[ri+1], bb = data[ri+2];

      const TOL = 38; // colour tolerance
      for (let i = 0; i < data.length; i += 4) {
        const dr = Math.abs(data[i]   - br);
        const dg = Math.abs(data[i+1] - bg);
        const db = Math.abs(data[i+2] - bb);
        if (dr < TOL && dg < TOL && db < TOL) {
          data[i+3] = 0; // transparent
        }
      }
      ctx.putImageData(imgData, 0, 0);
    };
    img.src = IMG_SRC;
  })();

  // ===== PDF VIEWER =====
  const pdfOverlay = document.getElementById('pdfOverlay');
  const pdfFrame   = document.getElementById('pdfFrame');
  const pdfTitle   = document.getElementById('pdfTitle');
  // Note: pdfBackBtn click is handled further down inside startEverything()
  // so that it also has access to the audio object and fadeInAndResume().

  function openPDF(story) {
    pdfTitle.textContent = story.title;
    pdfFrame.src = story.pdf;
    pdfOverlay.classList.add('open');
  }

  // ===== BUILD THUMBNAILS =====
  function buildThumbnails() {
    const scroller   = document.getElementById('thumbScroller');
    const mobileGrid = document.getElementById('mobileThumbGrid');
    scroller.innerHTML = '';
    mobileGrid.innerHTML = '';

    STORIES.forEach((story, i) => {
      // --- desktop floating item ---
      const item = document.createElement('div');
      item.className = 'thumb-item';
      item.style.animationDelay = (i * 0.15) + 's';
      item.innerHTML = `
        <div class="thumb-img-wrap">
          <div class="thumb-bob" style="animation-delay:${(i * 0.4).toFixed(1)}s">
            <img src="${story.thumbnail}" alt="${story.title}" onerror="this.style.background='#1a6fa8';this.style.width=this.style.width||'140px';this.style.height='185px'">
          </div>
        </div>
        <div class="thumb-title">${story.title}</div>`;
      item.addEventListener('click', () => openPDF(story));
      scroller.appendChild(item);

      // --- mobile grid item ---
      const mItem = document.createElement('div');
      mItem.className = 'm-thumb';
      mItem.innerHTML = `
        <img src="${story.thumbnail}" alt="${story.title}">
        <span>${story.title}</span>`;
      mItem.addEventListener('click', () => {
        closeMobilePanel();
        openPDF(story);
      });
      mobileGrid.appendChild(mItem);
    });

    setupThumbScroll();
  }

  // ===== DESKTOP SCROLL BEHAVIOUR =====
  function setupThumbScroll() {
    const track    = document.getElementById('thumbTrack');
    const scroller = document.getElementById('thumbScroller');
    const hintL    = document.getElementById('hintLeft');
    const hintR    = document.getElementById('hintRight');
    let offset = 0;
    let isDragging = false, startX = 0, startOffset = 0;
    let scrollable = false;

    function checkOverflow() {
      // Reset to full-width centred mode first so we can measure accurately
      scroller.style.width = '100%';
      scroller.style.justifyContent = 'center';
      scroller.style.transform = 'translateX(0)';
      offset = 0;

      requestAnimationFrame(() => requestAnimationFrame(() => {
        const items = Array.from(scroller.querySelectorAll('.thumb-item'));
        if (!items.length) return;
        const gap = parseFloat(getComputedStyle(scroller).gap) || 0;
        const padding = parseFloat(getComputedStyle(scroller).paddingLeft) * 2 || 0;
        const contentWidth = items.reduce((sum, el) => sum + el.offsetWidth, 0)
                           + gap * Math.max(0, items.length - 1)
                           + padding;
        const trackWidth = track.clientWidth;
        scrollable = contentWidth > trackWidth;
        if (scrollable) {
          // Switch to scrollable mode: shrink to content, align left, enable drag
          scroller.style.width = 'max-content';
          scroller.style.justifyContent = 'flex-start';
        }
        // else: stays full-width, centred — nothing more to do
        applyOffset();
      }));
    }

    function clampOffset() {
      const maxScroll = Math.max(0, scroller.scrollWidth - track.clientWidth);
      offset = Math.max(-maxScroll, Math.min(0, offset));
    }
    function applyOffset() {
      if (!scrollable) return;
      scroller.style.transform = `translateX(${offset}px)`;
      hintL.classList.toggle('show', offset < -10);
      hintR.classList.toggle('show', offset > -(scroller.scrollWidth - track.clientWidth) + 10);
    }

    // drag — only when content overflows
    scroller.addEventListener('pointerdown', e => {
      if (!scrollable) return;
      isDragging = true;
      startX = e.clientX;
      startOffset = offset;
    });
    scroller.addEventListener('pointermove', e => {
      if (!isDragging || !scrollable) return;
      offset = startOffset + (e.clientX - startX);
      clampOffset(); applyOffset();
    });
    scroller.addEventListener('pointerup', () => isDragging = false);

    // wheel
    track.addEventListener('wheel', e => {
      if (!scrollable) return;
      e.preventDefault();
      offset -= e.deltaY * 0.8;
      clampOffset(); applyOffset();
    }, { passive: false });

    // hint arrows
    hintL.addEventListener('click', () => {
      if (!scrollable) return;
      offset += track.clientWidth * 0.6;
      clampOffset(); applyOffset();
    });
    hintR.addEventListener('click', () => {
      if (!scrollable) return;
      offset -= track.clientWidth * 0.6;
      clampOffset(); applyOffset();
    });

    checkOverflow();
    window.addEventListener('resize', checkOverflow);
  }

  // stagger-reveal thumbnails
  function revealThumbnails() {
    document.getElementById('thumbTrack').style.pointerEvents = 'auto';
    document.querySelectorAll('.thumb-item').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 160);
    });
    // show mobile button
    const btn = document.getElementById('storiesBtn');
    btn.style.display = '';
    btn.style.opacity = '0';
    btn.style.transition = 'opacity 0.6s';
    setTimeout(() => btn.style.opacity = '1', 100);
  }

  // ===== MOBILE PANEL =====
  document.getElementById('storiesBtn').addEventListener('click', () => {
    document.getElementById('storiesPanel').classList.add('open');
  });
  function closeMobilePanel() {
    document.getElementById('storiesPanel').classList.remove('open');
  }
  document.getElementById('panelClose').addEventListener('click', closeMobilePanel);

  // ===== MUSIC + OVERLAY + YACHT TRIGGER =====
  (function() {
    const overlay = document.getElementById('startOverlay');
    const yacht   = document.getElementById('yacht');
    let started = false;

    function startEverything() {
      if (started) return;
      started = true;

      // Dismiss overlay
      overlay.classList.add('hiding');
      setTimeout(() => overlay.remove(), 900);

      // Start yacht sailing
      yacht.classList.add('sailing');

      // After yacht arrives (~5.1s = 0.6s delay + 4.5s animation),
      // switch to arrived state and reveal thumbnails
      setTimeout(() => {
        yacht.classList.remove('sailing');
        yacht.classList.add('arrived');
        buildThumbnails();
        revealThumbnails();
      }, 5200);

      // Start music
      // ── Try to load music.mp3 first; fall back to synthesised tune ──
      const audio = document.createElement('audio');
      audio.loop = true;
      audio.volume = 0;

      function fadeAudioIn() {
        let vol = 0;
        const fi = setInterval(() => {
          vol = Math.min(vol + 0.02, 0.7);
          audio.volume = vol;
          if (vol >= 0.7) clearInterval(fi);
        }, 60);
      }

      function startSynthMusic() {
        // Synthesised sea-shanty fallback (Web Audio API)
        console.info('music.mp3 not found – using synthesised fallback');
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const MELODY = [
          62,62,66, 69,69,67, 66,64,62, 64,0,0,
          62,66,69, 74,0,69,  67,66,64, 62,0,0,
          69,69,71, 73,71,69, 67,66,64, 66,0,0,
          62,66,69, 66,64,62, 64,62,61, 62,0,0
        ];
        const BASS = [
          62,69,69, 69,0,69,  67,66,64, 62,0,0,
          62,66,69, 69,0,62,  67,66,64, 62,0,0,
          69,69,71, 69,71,69, 67,66,64, 66,0,0,
          62,66,69, 66,64,62, 64,62,61, 62,0,0
        ];
        const BD = 0.28;
        function hz(m){ return 440*Math.pow(2,(m-69)/12); }
        function note(freq,t,dur,vol,type){
          if(!freq) return;
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
          g.gain.setValueAtTime(0,t);
          g.gain.linearRampToValueAtTime(vol,t+0.03);
          g.gain.setValueAtTime(vol,t+dur*0.6);
          g.gain.linearRampToValueAtTime(0,t+dur*0.95);
          o.connect(g); g.connect(ctx.destination);
          o.start(t); o.stop(t+dur);
        }
        // master gain proxy so fade functions work on ctx.destination-like object
        const masterGain = ctx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(ctx.destination);
        // patch audio object so fadeOutAndPause / fadeInAndResume still work
        Object.defineProperty(audio,'volume',{
          get(){ return masterGain.gain.value; },
          set(v){ masterGain.gain.value = Math.max(0,Math.min(1,v)); }
        });
        Object.defineProperty(audio,'paused',{ get(){ return ctx.state==='suspended'; } });
        audio.pause = () => ctx.suspend();
        audio.play  = () => ctx.resume();

        function scheduleLoop(start){
          const N=MELODY.length;
          for(let i=0;i<N;i++){
            const t=start+i*BD, d=BD*0.9;
            if(MELODY[i]) { note(hz(MELODY[i]),t,d,0.18,'sine'); note(hz(MELODY[i]+12),t,d*0.7,0.06,'sine'); }
            if(BASS[i])   note(hz(BASS[i]-12),t,d,0.12,'triangle');
          }
          return start+N*BD;
        }
        let nextStart = ctx.currentTime+0.1;
        const loopLen = MELODY.length*BD;
        function scheduleNext(){ nextStart=scheduleLoop(nextStart); setTimeout(scheduleNext,(loopLen-0.5)*1000); }
        scheduleNext();
        fadeAudioIn();
      }

      // Try real file first
      audio.src = 'music.mp3';
      audio.addEventListener('canplaythrough', () => {
        console.info('music.mp3 loaded OK');
        audio.play().then(fadeAudioIn).catch(err => {
          console.warn('audio.play() rejected:', err);
          startSynthMusic();
        });
      }, { once: true });
      audio.addEventListener('error', () => startSynthMusic(), { once: true });
      // Give the browser 1.5s to find the file, then fall back
      const synthFallbackTimer = setTimeout(startSynthMusic, 1500);
      audio.addEventListener('canplaythrough', () => clearTimeout(synthFallbackTimer), { once: true });
      audio.load();

      // ── Music pause / resume controls ──
      let musicPaused = false;

      function fadeOutAndPause() {
        if (musicPaused || audio.paused) return;
        const fadeOut = setInterval(() => {
          audio.volume = Math.max(0, audio.volume - 0.04);
          if (audio.volume <= 0) { clearInterval(fadeOut); audio.pause(); musicPaused = true; }
        }, 40);
      }

      function fadeInAndResume() {
        if (!musicPaused) return;
        audio.volume = 0;
        audio.play().then(() => {
          musicPaused = false;
          const fadeIn = setInterval(() => {
            audio.volume = Math.min(audio.volume + 0.02, 0.7);
            if (audio.volume >= 0.7) clearInterval(fadeIn);
          }, 60);
        }).catch(err => console.warn('Audio resume failed:', err));
      }

      // ANY click anywhere on the page stops the music —
      // but wait 1s after startup so the overlay click doesn't immediately stop it
      setTimeout(() => {
        document.addEventListener('click', () => fadeOutAndPause());
      }, 1000);

      // 'Back to shore' button resumes music as well as closing PDF
      document.getElementById('pdfBackBtn').addEventListener('click', () => {
        pdfOverlay.classList.remove('open');
        pdfFrame.src = '';
        fadeInAndResume();
      });

      // Escape key — toggle pause/resume (when PDF is not open)
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          if (pdfOverlay.classList.contains('open')) return; // PDF handles Escape separately
          musicPaused ? fadeInAndResume() : fadeOutAndPause();
        }
      });
    }

    overlay.addEventListener('click', startEverything);
    document.addEventListener('keydown', startEverything, { once: true });
  })();

  window.addEventListener('resize', () => { buildSea(); addShimmers(); });
</script>
